site_name: Jonathan Duncan | Custom Software & AI Integration
site_description: I build custom software and AI integrations that replace manual workflows, cut costs, and unlock revenue for established businesses.
site_url: https://jonathandduncan.github.io/jonathanduncanprowebsite/

nav:
  - Home: index.md
  - Services: services.md
  - Case Studies:
    - Overview: portfolio/index.md
    - Projects:
      - portfolio/projects/automotive-operations-platform.md
      - portfolio/projects/canadian-geocoding-api.md
      - portfolio/projects/climate-data-pipeline.md
      - portfolio/projects/diagnostic-visualization-platform.md
      - portfolio/projects/real-time-file-monitoring.md

theme:
  name: material
  custom_dir: overrides
  features:
    - search.suggest
    - toc.integrate
    - navigation.tabs
    - navigation.expand
    - navigation.sections
    - navigation.instant
    - navigation.instant.prefetch
    - content.tooltips
    - content.tabs.link
    - content.code.copy
    - navigation.footer
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline 
        name: Switch to dark mode
      primary: custom
      accent: custom  
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode    
      primary: custom
      accent: custom
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/logo.svg
  favicon: assets/favicon.png

extra:
  generator: true
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/jonathanduncan-dev/
    - icon: fontawesome/brands/github
      link: https://github.com/JonathanDDuncan
  analytics:
    # provider: google
    # property: G-W9Y130NXVZ

extra_css:
  - stylesheets/extra.css
  - stylesheets/hero.css
plugins:
  - search
  - social:
      cards_layout_options:
        background_color: "#111111"
  - blog:
      blog_dir: blog
      authors_file: "{blog}/.authors.yml"
      categories: true

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - pymdownx.keys

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js

copyright: |
