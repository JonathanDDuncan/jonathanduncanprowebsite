site_name: Jonathan Duncan
site_description: Freelance Software & AI Engineer | Custom-Built AI Enabled Solutions
site_url: https://jonathanduncan.pro

nav:
  - Home: index.md
  - Services: services.md
  - Projects:
    - Overview: portfolio/index.md
    - Automotive Operations Automation Platform: portfolio/projects/automotive-operations-platform.md
    - Climate Data Pipeline and Integration Platform: portfolio/projects/climate-data-pipeline.md
    - Real-Time File Monitoring System: portfolio/projects/real-time-file-monitoring.md
    - Diagnostic Visualization Platform: portfolio/projects/diagnostic-visualization-platform.md
    - Canadian Geocoding API: portfolio/projects/canadian-geocoding-api.md

theme:
  name: material
  custom_dir: overrides
  features:
    - search.suggest
    - toc.integrate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.sections
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.top
    - navigation.path
    - content.tooltips
    - content.tabs.link
    - content.code.copy
    - navigation.footer
  language: en
  palette:
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode    
      primary: custom
      accent: custom
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline 
        name: Switch to dark mode
      primary: custom
      accent: custom  
  font:
    text: Inter
    code: Roboto Mono
  logo: assets/logo.svg
  favicon: assets/favicon.png

extra:
  generator: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JonathanDDuncan
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/jonathan-duncan-ai-dev
    - icon: fontawesome/solid/briefcase
      link: https://www.upwork.com/freelancers/jonathanduncan
  analytics:
    # provider: google
    # property: G-W9Y130NXVZ

extra_css:
  - stylesheets/extra.css
  - stylesheets/hero.css
plugins:
  - search
  - social:
      cards_layout_options:
        background_color: "#1F1F1F"

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - pymdownx.keys

extra_javascript:
  - javascripts/extra.js
  - javascripts/consent.js
  - https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js

copyright: |
